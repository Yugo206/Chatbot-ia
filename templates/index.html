<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Pro</title>

<!-- Librairies Markdown et sécurité -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:950px;
    height:92vh;
    background:rgba(30,41,59,0.7);
    backdrop-filter: blur(20px);
    border-radius:24px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

header{
    background:linear-gradient(90deg,#ED8421,#facc15);
    padding:1rem;
    text-align:center;
    font-weight:bold;
    color:black;
    position:relative;
    font-size:1.1rem;
}

#logoutBtn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    background:#0f172a;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

#logoutBtn:hover{
    background:#1e293b;
}

#chat{
    flex:1;
    padding:25px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.message{
    max-width:70%;
    padding:14px;
    border-radius:16px;
    white-space:pre-wrap;
    line-height:1.4;
    animation:fadeIn 0.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    box-shadow:0 5px 15px rgba(37,99,235,0.4);
}

.bot{
    align-self:flex-start;
    background:linear-gradient(135deg,#16a34a,#15803d);
    box-shadow:0 5px 15px rgba(22,163,74,0.4);
}

.system{
    align-self:center;
    background:#334155;
    font-size:0.9rem;
    opacity:0.9;
}

#status{
    text-align:center;
    padding:6px;
    font-size:0.85rem;
    color:#facc15;
    min-height:20px;
}

#input-area{
    display:flex;
    padding:15px;
    gap:10px;
    background:rgba(15,23,42,0.8);
    border-top:1px solid rgba(255,255,255,0.05);
}

input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#1e293b;
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    box-shadow:0 0 0 2px #ED8421;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ED8421,#f97316);
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 5px 15px rgba(249,115,22,0.4);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

/* Scrollbar custom */
#chat::-webkit-scrollbar {
    width:8px;
}
#chat::-webkit-scrollbar-thumb {
    background:#475569;
    border-radius:10px;
}
</style>
</head>

<body>
<div id="app">
<header>🤖 Chatbot Pro
<button id="logoutBtn">Logout</button></header>
<div id="chat"></div>
<div id="status"></div>

<div id="input-area">
<input id="msg" placeholder="Écris ton message...">
<button id="sendBtn">Envoyer</button>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const chat = document.getElementById("chat");
    const statusBox = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const input = document.getElementById("msg");

    let username = "";
    let sessionActive = false;

    function addMessage(type,text){
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    // -------- SESSION CHECK --------
    async function checkSession(){
        const res = await fetch("/me", {
            credentials: "include"
        });

        const data = await res.json();

        if(data.logged){
            username = data.username;
            sessionActive = true;
            addMessage("system", "Bienvenue " + username + " 👋");
            return;
        }

        await login();
    }

    // -------- LOGIN --------
    async function login(){
        username = prompt("Pseudo :");
        const password = prompt("Mot de passe :");

        if(!username || !password){
            alert("Connexion annulée");
            location.reload();
        }

        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({username, password}),
            credentials: "include"
        });

        const data = await res.json();

        if(data.error){
            alert(data.error);
            location.reload();
        }

        addMessage("system", "Bienvenue " + data.username + " 👋");
        sessionActive = true;
    }

    // -------- LOGOUT --------
    async function logout(){
        await fetch("/logout", {
            method: "POST",
            credentials: "include"
        });

        location.reload();
    }

    // -------- ENVOI --------
    function send(){
        if(!sessionActive) return;
        const message = input.value.trim();
        if(!message) return;

        input.value = "";
        sendBtn.disabled = true;
        const userDiv = addMessage("user", DOMPurify.sanitize(message));

        const botDiv = addMessage("bot","");
        statusBox.innerText = "Connexion...";

        let fullResponse = "";

        fetch("/stream",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message}),
        credentials:"include"
    }).then(async response => {

        if (!response.ok) {
            // si le serveur renvoie 4xx ou 5xx
            const data = await response.json();
            alert("Erreur : " + (data.error || "Inconnue"));
            sendBtn.disabled = false;
            return; // stoppe ici
        }

        // seulement si tout est ok, on commence le stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();


            function read() {
                reader.read().then(({done, value}) => {
                    if(done){
                        sendBtn.disabled = false;
                        return;
                    }

                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n\n");

                    lines.forEach(line => {
                        if(line.startsWith("data: ")){
                            const data = JSON.parse(line.replace("data: ", ""));

                            if(data.type === "queue"){
                                statusBox.innerText =
                                    "Tu es dans la file d'attente, " +
                                    data.position +
                                    " personnes devant vous";
                            }

                            if(data.type === "token"){
                                statusBox.innerText = "Génération en cours...";
                                fullResponse += data.content;
                                botDiv.innerHTML = marked.parse(DOMPurify.sanitize(fullResponse));
                            }

                            if(data.type === "done"){
                                statusBox.innerText = "Terminé";
                                sendBtn.disabled = false;
                            }

                            if(data.type === "error"){
                                botDiv.innerText = "Erreur : " + data.content;
                                sendBtn.disabled = false;
                            }
                        }
                    });

                    read();
                });
            }

            read();
        });
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", e => { if(e.key === "Enter") send(); });

    document.getElementById("logoutBtn").addEventListener("click", logout);

    checkSession();
});
</script>
</body>
</html>
