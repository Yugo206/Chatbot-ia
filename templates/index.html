<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Pro</title>

<!-- Librairies Markdown et sécurité -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:950px;
    height:92vh;
    background:rgba(30,41,59,0.7);
    backdrop-filter: blur(20px);
    border-radius:24px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

header{
    background:linear-gradient(90deg,#ED8421,#facc15);
    padding:1rem;
    text-align:center;
    font-weight:bold;
    color:black;
    position:relative;
    font-size:1.1rem;
}

#logoutBtn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    background:#0f172a;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

#logoutBtn:hover{
    background:#1e293b;
}

#chat{
    flex:1;
    padding:25px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.message{
    max-width:70%;
    padding:14px;
    border-radius:16px;
    white-space:pre-wrap;
    line-height:1.4;
    animation:fadeIn 0.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    box-shadow:0 5px 15px rgba(37,99,235,0.4);
}

.bot{
    align-self:flex-start;
    background:linear-gradient(135deg,#16a34a,#15803d);
    box-shadow:0 5px 15px rgba(22,163,74,0.4);
}

.system{
    align-self:center;
    background:#334155;
    font-size:0.9rem;
    opacity:0.9;
}

#status{
    text-align:center;
    padding:6px;
    font-size:0.85rem;
    color:#facc15;
    min-height:20px;
}

#input-area{
    display:flex;
    padding:15px;
    gap:10px;
    background:rgba(15,23,42,0.8);
    border-top:1px solid rgba(255,255,255,0.05);
}

input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#1e293b;
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    box-shadow:0 0 0 2px #ED8421;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ED8421,#f97316);
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
    box-shadow:0 5px 15px rgba(249,115,22,0.4);
}

.print-btn{
    margin-top:8px;
    padding:8px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#334155,#1e293b);
    color:white;
    font-size:0.85rem;
    cursor:pointer;
    transition:0.2s;
    align-self:flex-end;
}

.print-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 5px 12px rgba(0,0,0,0.4);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

#startupOverlay{
    position:absolute;
    inset:0;
    background:rgba(2,6,23,0.96);
    z-index:9999;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    text-align:center;
    padding:30px;
}

#startupSpinner{
    width:70px;
    height:70px;
    border-radius:50%;
    border:5px solid #334155;
    border-top:5px solid #ED8421;
    animation:startupSpin 1s linear infinite;
}

@keyframes startupSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

#startupTitle{
    font-size:1.5rem;
    font-weight:bold;
}

#startupMessage{
    max-width:500px;
    opacity:0.9;
    line-height:1.5;
}

#startupTimer{
    color:#facc15;
    font-size:1.1rem;
    font-weight:bold;
}
</style>
</head>

<body>
<div id="startupOverlay">
    <div id="startupSpinner"></div>

    <div id="startupTitle">🟠 Réveil du serveur...</div>

    <div id="startupMessage">
        Le chatbot prépare la connexion à l'intelligence artificielle.<br>
        Cela peut prendre quelques secondes lorsque le serveur se réveille.
    </div>

    <div id="startupTimer">Vérification...</div>
</div>
<div id="loginPage" style="position:absolute;inset:0;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#0f172a,#020617);z-index:10;">
  <div style="width:360px;background:rgba(30,41,59,0.8);backdrop-filter:blur(20px);padding:30px;border-radius:20px;box-shadow:0 0 40px rgba(0,0,0,0.6);display:flex;flex-direction:column;gap:15px;">
    <h2 style="text-align:center;margin:0;">Connexion</h2>
    <input id="loginUsername" placeholder="Nom d'utilisateur">
    <input id="loginPassword" type="password" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
    <p id="loginError" style="color:#f87171;text-align:center;font-size:0.9rem;"></p>
  </div>
</div>
<div id="app" style="display:none;">
<header>🤖 Chatbot Pro
<button id="logoutBtn">Logout</button></header>
<div id="chat"></div>
<div id="status"></div>

<div id="input-area">
<input id="msg" placeholder="Écris ton message...">
<button id="sendBtn">Envoyer</button>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const chat = document.getElementById("chat");
    const statusBox = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const input = document.getElementById("msg");

    const startupOverlay = document.getElementById("startupOverlay");
    const startupTimer = document.getElementById("startupTimer");
    async function waitForBackendReady(){
        startupOverlay.style.display = "flex";

        let seconds = 0;

        const timerInterval = setInterval(() => {
            seconds++;
            startupTimer.innerText = `Temps d'attente : ${seconds}s`;
        }, 1000);

        async function check(){
            try{
                const res = await fetch("/health", {
                    credentials:"include"
                });

                const data = await res.json();

                if(data.ready){
                    clearInterval(timerInterval);
                    startupOverlay.style.display = "none";
                    return true;
                }

                startupTimer.innerText = data.message || "Réveil du serveur...";

            } catch(e){
                startupTimer.innerText = "Connexion au serveur...";
            }

            return false;
        }

        while(true){
            const ready = await check();

            if(ready){
                break;
            }

            await new Promise(resolve => setTimeout(resolve, 5000));
        }
    }

    let username = "";
    let sessionActive = false;
    let csrfToken = "";

    function addMessage(type,text){
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    // -------- SESSION CHECK --------
    async function checkSession(){
        const res = await fetch("/me", { credentials:"include" });
        const data = await res.json();

        if(data.logged){
            username = data.username;
            sessionActive = true;
            csrfToken = data.csrf_token || "";

            document.getElementById("loginPage").style.display = "none";
            document.getElementById("app").style.display = "flex";

            addMessage("system", "Bienvenue " + username + " 👋");
        }
    }

    // -------- LOGIN --------
    async function login(){
        const usernameInput = document.getElementById("loginUsername");
        const passwordInput = document.getElementById("loginPassword");
        const errorBox = document.getElementById("loginError");

        const usernameVal = usernameInput.value.trim();
        const passwordVal = passwordInput.value.trim();

        if(!usernameVal || !passwordVal){
            errorBox.innerText = "Veuillez remplir tous les champs";
            return;
        }

        errorBox.innerText = "Connexion...";

        try{
            const res = await fetch("/login", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    ...(csrfToken ? {"X-CSRF-Token": csrfToken} : {})
                },
                body: JSON.stringify({username: usernameVal, password: passwordVal}),
                credentials:"include"
            });

            const data = await res.json();

            if(!res.ok || data.error){
                errorBox.innerText = data.error || "Identifiants incorrects";
                return;
            }

            username = data.username;
            sessionActive = true;

            document.getElementById("loginPage").style.display = "none";
            document.getElementById("app").style.display = "flex";

            addMessage("system", "Bienvenue " + username + " 👋");

        } catch(e){
            errorBox.innerText = "Erreur réseau";
        }
    }

    document.getElementById("loginBtn").addEventListener("click", login);

    // -------- LOGOUT --------
    async function logout(){
        await fetch("/logout", {
            method: "POST",
            credentials: "include",
            headers: csrfToken ? { "X-CSRF-Token": csrfToken } : {}
        });

        location.reload();
    }

    // -------- ENVOI --------
    function send(){
        if(!sessionActive) return;
        const message = input.value.trim();
        if(!message) return;

        input.value = "";
        sendBtn.disabled = true;
        const userDiv = addMessage("user", DOMPurify.sanitize(message));

        const botDiv = addMessage("bot","");
        statusBox.innerText = "Connexion...";

        let fullResponse = "";

        fetch("/stream",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            ...(csrfToken ? {"X-CSRF-Token": csrfToken} : {})
        },
        body: JSON.stringify({message}),
        credentials:"include"
    }).then(async response => {

        if (!response.ok) {
            let errText = "Erreur serveur";
            try {
                const data = await response.json();
                errText = data.error || errText;
            } catch (_) {}
            alert("Erreur : " + errText);
            sendBtn.disabled = false;
            return;
        }

        // seulement si tout est ok, on commence le stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();


            function read() {
                reader.read().then(({ done, value }) => {
                    if (done) {
                        sendBtn.disabled = false;
                        statusBox.innerText = "Terminé";
                        return;
                    }

                    try {
                        const chunk = decoder.decode(value, { stream: true });

                        // SSE can split data -> we still process line by line safely
                        const lines = chunk.split("\n\n");

                        lines.forEach(line => {
                            if (!line.startsWith("data: ")) return;

                            const jsonStr = line.replace("data: ", "").trim();

                            let data;
                            try {
                                data = JSON.parse(jsonStr);
                            } catch (e) {
                                console.log("SSE parse error:", jsonStr);
                                return;
                            }

                            if (data.type === "queue") {
                                statusBox.innerText =
                                    "Tu es dans la file d'attente, " +
                                    data.position +
                                    " personnes devant vous";
                            }

                            if (data.type === "token") {
                                statusBox.innerText = "Génération en cours...";
                                fullResponse += data.content;
                                botDiv.innerHTML = marked.parse(DOMPurify.sanitize(fullResponse));
                            }

                            if (data.type === "done") {
                                statusBox.innerText = "Terminé";
                                sendBtn.disabled = false;

                                const printBtn = document.createElement("button");
                                printBtn.innerText = "Imprimer";
                                printBtn.className = "print-btn";

                                printBtn.addEventListener("click", () => {
                                    const printWindow = window.open("", "_blank");

                                    const content = `
                                        <html>
                                        <head>
                                            <title>Impression</title>
                                            <style>
                                                body{font-family:Arial, sans-serif;padding:20px;}
                                                h2{margin-bottom:10px;}
                                                .block{margin-bottom:20px;}
                                            </style>
                                        </head>
                                        <body>
                                            <div class="block">
                                                <h2>Message utilisateur</h2>
                                                <p>${userDiv.innerText}</p>
                                            </div>
                                            <div class="block">
                                                <h2>Réponse IA</h2>
                                                <p>${botDiv.innerText}</p>
                                            </div>
                                        </body>
                                        </html>
                                    `;

                                    printWindow.document.write(content);
                                    printWindow.document.close();
                                    printWindow.focus();
                                    printWindow.print();
                                });

                                botDiv.appendChild(printBtn);
                            }

                            if (data.type === "error") {
                                botDiv.innerText = "Erreur : " + data.content;
                                sendBtn.disabled = false;
                            }
                        });

                    } catch (e) {
                        console.error("STREAM ERROR:", e);
                        statusBox.innerText = "Erreur de connexion";
                        sendBtn.disabled = false;
                    }

                    read();
                });
            }

            read();
        });
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", e => { if(e.key === "Enter") send(); });

    document.getElementById("logoutBtn").addEventListener("click", logout);

    await waitForBackendReady();
    checkSession();
});
</script>
</body>
</html>
